<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — HUD Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: #0A0A08;
    color: #D4A026;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: rgba(212, 160, 38, 0.25); color: #F5C842; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0A0A08; }
  ::-webkit-scrollbar-thumb { background: rgba(212, 160, 38, 0.2); }

  @keyframes pulse-dim {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* HUD Nav */
  .hud-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: center; gap: 32px;
    padding: 16px 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    background: linear-gradient(180deg, rgba(10,10,8,0.95) 0%, transparent 100%);
  }
  .hud-nav a {
    color: rgba(212, 160, 38, 0.4);
    text-decoration: none; text-transform: uppercase;
    transition: color 0.3s;
    cursor: pointer;
  }
  .hud-nav a:hover { color: #F5C842; }

  /* Edge lines */
  .edge-left, .edge-right {
    position: fixed; top: 0; bottom: 0; width: 1px; z-index: 50;
    background: linear-gradient(180deg, transparent, rgba(212,160,38,0.08) 20%, rgba(212,160,38,0.08) 80%, transparent);
  }
  .edge-left { left: 16px; }
  .edge-right { right: 16px; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 10000;
    width: 280px; padding: 20px;
    background: rgba(10, 10, 8, 0.95);
    border: 1px solid rgba(212, 160, 38, 0.3);
    font-family: 'Share Tech Mono', monospace;
    backdrop-filter: blur(8px);
  }
  .tweaks-panel label {
    display: block; font-size: 10px; letter-spacing: 2px;
    color: rgba(212, 160, 38, 0.5); margin-bottom: 4px; margin-top: 14px;
  }
  .tweaks-panel label:first-of-type { margin-top: 0; }
  .tweaks-panel input[type="text"], .tweaks-panel textarea {
    width: 100%; padding: 6px 8px;
    background: rgba(212, 160, 38, 0.04);
    border: 1px solid rgba(212, 160, 38, 0.15);
    color: #D4A026; font-family: 'Share Tech Mono', monospace;
    font-size: 12px; outline: none;
  }
  .tweaks-panel textarea { resize: vertical; height: 60px; }
  .tweaks-panel select {
    width: 100%; padding: 6px 8px;
    background: #0A0A08; border: 1px solid rgba(212, 160, 38, 0.15);
    color: #D4A026; font-family: 'Share Tech Mono', monospace;
    font-size: 12px; outline: none;
  }
  .tweaks-title {
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(212, 160, 38, 0.7); margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid rgba(212, 160, 38, 0.1);
  }
</style>
</head>
<body>

<div id="root"></div>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "playerName": "SAI MAYANK",
  "tagline": "Building worlds from code — one system at a time. Specializing in real-time gameplay and modern web interfaces that feel alive.",
  "accentHue": "amber",
  "crtEffects": true
}/*EDITMODE-END*/;
</script>

<script type="text/babel" src="components/HUDElements.jsx"></script>
<script type="text/babel" src="components/Sections.jsx"></script>

<script type="text/babel">

function App() {
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [config, setConfig] = React.useState({...TWEAK_DEFAULTS});

  // Tweaks protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...config, [key]: val };
    setConfig(next);
    Object.assign(TWEAK_DEFAULTS, next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  return React.createElement(React.Fragment, null,
    config.crtEffects && React.createElement(CRTFlicker),
    config.crtEffects && React.createElement(Scanlines),
    config.crtEffects && React.createElement(Vignette),

    // Edge decorations
    React.createElement('div', { className: 'edge-left' }),
    React.createElement('div', { className: 'edge-right' }),

    // Nav
    React.createElement('nav', { className: 'hud-nav' },
      ['Profile', 'Missions', 'Systems', 'Comms'].map(s =>
        React.createElement('a', {
          key: s,
          onClick: () => {
            const map = { Profile: 'about', Missions: 'projects', Systems: 'skills', Comms: 'contact' };
            document.getElementById(map[s])?.scrollIntoView && 
              document.getElementById(map[s])?.closest('section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }, s)
      )
    ),

    // Main wrapper
    React.createElement('div', { className: config.crtEffects ? 'crt-active' : '' },
      React.createElement(HeroSection),
      React.createElement('div', { id: 'about' }, React.createElement(AboutSection)),
      React.createElement('div', { id: 'projects' }, React.createElement(ProjectsSection)),
      React.createElement('div', { id: 'skills' }, React.createElement(SkillsSection)),
      React.createElement('div', { id: 'contact' }, React.createElement(ContactSection)),
    ),

    // Tweaks panel
    tweaksVisible && React.createElement('div', { className: 'tweaks-panel' },
      React.createElement('div', { className: 'tweaks-title' }, 'Tweaks'),
      React.createElement('label', null, 'PLAYER NAME'),
      React.createElement('input', {
        type: 'text', value: config.playerName,
        onChange: (e) => updateTweak('playerName', e.target.value),
      }),
      React.createElement('label', null, 'TAGLINE'),
      React.createElement('textarea', {
        value: config.tagline,
        onChange: (e) => updateTweak('tagline', e.target.value),
      }),
      React.createElement('label', null, 'CRT EFFECTS'),
      React.createElement('select', {
        value: config.crtEffects ? 'on' : 'off',
        onChange: (e) => updateTweak('crtEffects', e.target.value === 'on'),
      },
        React.createElement('option', { value: 'on' }, 'Enabled'),
        React.createElement('option', { value: 'off' }, 'Disabled'),
      ),
    ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
